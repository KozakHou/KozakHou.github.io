name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/prettier.yml"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/prettier.yml"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          fail: true
          # Skip Liquid tags in source ({{ ... | relative_url }}) — those are not real paths
          # until Jekyll builds. Still checks real https:// links in the same files.
          args: >-
            --user-agent 'curl/7.54'
            --exclude '\{\{'
            --exclude-path README.md
            --exclude-path _pages/404.md
            --verbose
            --no-progress
            './**/*.md'
            './**/*.html'
